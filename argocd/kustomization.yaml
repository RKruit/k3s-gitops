apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: argocd
patchesJson6902:
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: argocd-server
      namespace: argocd
    patch: '[{"op":"add","path":"/spec/template/spec/containers/0/env/-","value":{"name":"ARGOCD_SERVER_INSECURE","value":"true"}}]'
resources:
  - argocd-install/install.yaml
  - argocd-app-openbao.yaml
  - argocd-app-monitoring.yaml
  - argocd-app-nfs-provisioner.yaml
  - argocd-app-bootstrap.yaml
