apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: asa-server
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/RKruit/k3s-gitops.git
    targetRevision: HEAD
    path: base/asa-server
  destination:
    server: https://kubernetes.default.svc
    namespace: asa-server
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
