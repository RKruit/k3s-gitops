apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sv02-bootstrap
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/RKruit/k3s-gitops
    targetRevision: main
    path: clusters/sv02
  destination:
    server: https://192.168.1.3:6443
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
