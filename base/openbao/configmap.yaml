apiVersion: v1
kind: ConfigMap
metadata:
  name: openbao-config
  namespace: openbao
data:
  config.hcl: |
    telemetry {
      prometheus_retention_time = "24h"
    }
    storage "file" {
      path = "/openbao/data"
    }
    listener "tcp" {
      address = "0.0.0.0:8200"
      tls_disable = true
    }
    api_addr = "http://127.0.0.1:8200"
    cluster_addr = "http://127.0.0.1:8201"
    default_lease_ttl = "768h"
    max_lease_ttl = "8760h"
