apiVersion: apps/v1
kind: Deployment
metadata:
  name: openbao
  namespace: openbao
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openbao
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: openbao
    spec:
      initContainers:
        - name: init
          image: docker.io/openbao/openbao:2.5.2
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c", "mkdir -p /openbao/data && chown -R 100:100 /openbao/data"]
          volumeMounts:
            - name: data
              mountPath: /openbao/data
      containers:
        - name: auto-unseal
          image: docker.io/library/alpine:3.19
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c", "/scripts/auto-unseal.sh"]
          volumeMounts:
            - name: unseal-key
              mountPath: /unseal-key
              readOnly: true
            - name: scripts
              mountPath: /scripts
              readOnly: true
        - name: openbao
          image: docker.io/openbao/openbao:2.5.2
          imagePullPolicy: IfNotPresent
          command: ["bao"]
          args:
            - "server"
            - "-config=/openbao/config/config.hcl"
          env:
            - name: BAO_ADDR
              value: "0.0.0.0:8200"
          ports:
            - containerPort: 8200
              name: http
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              memory: "256Mi"
          volumeMounts:
            - name: config
              mountPath: /openbao/config
              readOnly: true
            - name: data
              mountPath: /openbao/data
      volumes:
        - name: config
          configMap:
            name: openbao-config
        - name: data
          persistentVolumeClaim:
            claimName: openbao-data
        - name: unseal-key
          secret:
            secretName: openbao-unseal-key
            defaultMode: 0400
        - name: scripts
          configMap:
            name: openbao-scripts
            defaultMode: 0777