apiVersion: apps/v1
kind: Deployment
metadata:
  name: openbao
  namespace: openbao
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openbao
  template:
    metadata:
      labels:
        app: openbao
    spec:
      initContainers:
      - name: init
        image: docker.io/openbao/openbao:latest
        command: ["sh", "-c", "mkdir -p /openbao/config && chown -R 100:100 /openbao"]
        volumeMounts:
          - name: data
            mountPath: /openbao
      containers:
      - name: openbao
        image: docker.io/openbao/openbao:latest
        args:
          - "server"
          - "-dev"
          - "-dev-root-token-id=testing"
        env:
          - name: BAO_ADDR
            value: "0.0.0.0:8200"
        ports:
          - containerPort: 8200
        volumeMounts:
          - name: data
            mountPath: /openbao
      volumes:
        - name: data
          emptyDir: {}