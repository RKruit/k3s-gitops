apiVersion: apps/v1
kind: Deployment
metadata:
  name: openbao
  namespace: openbao
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openbao
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: openbao
    spec:
      initContainers:
        - name: init
          image: docker.io/openbao/openbao:3.0
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c", "mkdir -p /openbao/data /openbao/config && chown -R 100:100 /openbao"]
          volumeMounts:
            - name: data
              mountPath: /openbao/data
            - name: config
              mountPath: /openbao/config
      containers:
        - name: openbao
          image: docker.io/openbao/openbao:3.0
          imagePullPolicy: IfNotPresent
          command: ["bao"]
          args:
            - "server"
            - "-config=/openbao/config/config.hcl"
          env:
            - name: BAO_ADDR
              value: "0.0.0.0:8200"
          ports:
            - containerPort: 8200
              name: http
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /v1/sys/health
              port: 8200
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /v1/sys/health
              port: 8200
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: config
              mountPath: /openbao/config
              readOnly: true
            - name: data
              mountPath: /openbao/data
      volumes:
        - name: config
          configMap:
            name: openbao-config
        - name: data
          persistentVolumeClaim:
            claimName: openbao-data