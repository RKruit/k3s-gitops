apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: asa-server
  namespace: asa-server
spec:
  serviceName: asa-server
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: asa-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: asa-server
    spec:
      restartPolicy: Always
      containers:
      - name: asa-server
        image: docker.io/acekorneya/asa_server:latest
        ports:
        - name: game
          containerPort: 7777
          protocol: TCP
        - name: game-udp
          containerPort: 7777
          protocol: UDP
        - name: rcon
          containerPort: 27020
          protocol: TCP
        env:
        - name: PUID
          value: "1000"
        - name: PGID
          value: "1000"
        - name: BATTLEEYE
          value: "FALSE"
        - name: RCON_ENABLED
          value: "TRUE"
        - name: DISPLAY_POK_MONITOR_MESSAGE
          value: "FALSE"
        - name: UPDATE_SERVER
          value: "TRUE"
        - name: CHECK_FOR_UPDATE_INTERVAL
          value: "24"
        - name: UPDATE_WINDOW_MINIMUM_TIME
          value: "12:00 AM"
        - name: UPDATE_WINDOW_MAXIMUM_TIME
          value: "11:59 PM"
        - name: RESTART_NOTICE_MINUTES
          value: "30"
        - name: ENABLE_MOTD
          value: "FALSE"
        - name: MAP_NAME
          value: "TheIsland"
        - name: SESSION_NAME
          value: "TokkieTown"
        - name: SERVER_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: asa-server-secret
              key: admin-password
        - name: SERVER_PASSWORD
          valueFrom:
            secretKeyRef:
              name: asa-server-secret
              key: server-password
        - name: ASA_PORT
          value: "7777"
        - name: RCON_PORT
          value: "27020"
        - name: MAX_PLAYERS
          value: "70"
        - name: CLUSTER_ID
          value: "cluster"
        - name: MOD_IDS
          value: ""
        - name: CUSTOM_SERVER_ARGS
          value: ""
        - name: DISABLE_POK_MONITOR
          value: "TRUE"
        volumeMounts:
        - name: data
          mountPath: /usr/games/.wine/drive_c/POK/Steam/steamapps/common/ARK Survival Ascended Dedicated Server/ShooterGame
        - name: data
          mountPath: /usr/games/.wine/drive_c/POK/Steam/steamapps/common/ARK Survival Ascended Dedicated Server
          subPath: server-binaries
        resources:
          requests:
            memory: "16Gi"
            cpu: "500m"
          limits:
            memory: "16Gi"
            cpu: "4"
        securityContext:
          runAsNonRoot: false
          privileged: true
        startupProbe:
          exec:
            command:
            - pgrep
            - -f
            - ArkServer
          failureThreshold: 60
          periodSeconds: 10
        livenessProbe:
          exec:
            command:
            - pgrep
            - -f
            - ArkServer
          initialDelaySeconds: 300
          periodSeconds: 60
          failureThreshold: 3
        readinessProbe:
          tcpSocket:
            port: 7777
          initialDelaySeconds: 300
          periodSeconds: 30
          failureThreshold: 5
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: asa-server-data
