---
# Nightly restic backup — mounts Synology NFS directly, backs up all PVCs
# Runs at 02:00 daily
apiVersion: batch/v1
kind: CronJob
metadata:
  name: velero-backup
  namespace: velero
spec:
  schedule: "0 2 * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid
  jobTemplate:
    metadata:
      labels:
        app: velero-backup
    spec:
      template:
        metadata:
          labels:
            app: velero-backup
        spec:
          restartPolicy: OnFailure
          serviceAccountName: velero-backup
          initContainers:
            - name: init-repo
              image: docker.io/restic/restic:0.17.3
              command:
                - sh
                - -c
                - |
                  restic --repo /nfs/k8sv2/backups/restic init || true
              env:
                - name: RESTIC_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: restic-backup-creds
                      key: password
              volumeMounts:
                - name: nas-backups
                  mountPath: /nfs/k8sv2
          volumes:
            # Mount Synology NFS directly — contains all PVC subdirectories
            - name: nas-backups
              nfs:
                server: 192.168.1.2
                path: /volume1/k8sv2
          containers:
            - name: restic
              image: docker.io/restic/restic:0.17.3
              args:
                - backup
                - --verbose
                - --host
                - sv01
                - --tag
                - k8s-backup
                - --exclude
                - "**/lost+found"
                - /nfs/k8sv2
              env:
                - name: RESTIC_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: restic-backup-creds
                      key: password
                - name: RESTIC_REPOSITORY
                  value: /nfs/k8sv2/backups/restic
              volumeMounts:
                - name: nas-backups
                  mountPath: /nfs/k8sv2
              resources:
                requests:
                  cpu: 100m
                  memory: 64Mi
                limits:
                  cpu: 500m
                  memory: 128Mi
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: velero-backup
  namespace: velero
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: velero-backup
  namespace: velero
rules:
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: velero-backup
  namespace: velero
subjects:
  - kind: ServiceAccount
    name: velero-backup
    namespace: velero
roleRef:
  kind: Role
  name: velero-backup
  apiGroup: rbac.authorization.k8s.io