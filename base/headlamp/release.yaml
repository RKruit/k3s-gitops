apiVersion: v1
kind: Namespace
metadata:
  name: headlamp
  labels:
    app.kubernetes.io/name: headlamp
---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: HelmRepository
metadata:
  name: headlamp
  namespace: headlamp
spec:
  interval: 1h
  url: https://headlamp-k8s.github.io/headlamp
---
apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: headlamp
  namespace: headlamp
spec:
  interval: 1h
  chartRef:
    kind: HelmChart
    name: headlamp
  install:
    createNamespace: true
  values:
    ingress:
      enabled: false
    service:
      type: ClusterIP
      port: 80
---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: HelmChart
metadata:
  name: headlamp
  namespace: headlamp
spec:
  interval: 1h
  sourceRef:
    kind: HelmRepository
    name: headlamp
  chart: headlamp
  version: "*"
