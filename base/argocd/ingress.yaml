apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: argocd-server
  namespace: argocd
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`argocd.oostrandpark.com`)
      services:
        - kind: Service
          name: argocd-server
          port: 80
          scheme: http
  tls: {}
