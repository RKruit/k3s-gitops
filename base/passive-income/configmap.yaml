apiVersion: v1
kind: ConfigMap
metadata:
  name: passive-income-html
  namespace: passive-income
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Passive Income</title>
    <style>
    :root {
      --bg: #0a0a0a;
      --fg: #e5e5e5;
      --accent: #2563eb;
      --muted: #737373;
      --card: #141414;
      --border: #262626;
      --border-hover: #404040;
      --warn: #d97706;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      background:var(--bg);color:var(--fg);
      font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
      font-size:14px;line-height:1.4;
      -webkit-font-smoothing:antialiased;
    }
    main{max-width:640px;margin:0 auto;padding:32px 16px}
    header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:24px;gap:16px}
    h1{font-size:24px;font-weight:700;letter-spacing:-0.02em;line-height:1}
    header p{color:var(--muted);font-size:11px;margin-top:4px}
    .header-right{display:flex;align-items:center;gap:12px}
    #last-fetch{font-size:11px;color:var(--muted);white-space:nowrap}
    button{
      background:transparent;color:var(--fg);border:1px solid var(--border);
      padding:5px 12px;font-size:12px;font-weight:500;cursor:pointer;
      transition:border-color .15s;
    }
    button:hover{border-color:var(--border-hover)}
    button:disabled{opacity:.3;cursor:default}
    .error{
      font-size:11px;color:var(--warn);border:1px solid rgba(217,119,6,.2);
      background:rgba(217,119,6,.08);padding:8px 12px;margin-bottom:16px;line-height:1.5;
    }
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
    .card{
      background:var(--card);border:1px solid var(--border);padding:16px;
    }
    .card-label{
      font-size:10px;text-transform:uppercase;letter-spacing:0.06em;
      color:var(--muted);margin-bottom:6px;
    }
    .card-value{font-size:22px;font-weight:700;line-height:1}
    .card-sub{font-size:10px;color:var(--muted);margin-top:3px}
    .chart-card{background:var(--card);border:1px solid var(--border);padding:16px;margin-bottom:16px}
    .chart-header{font-size:10px;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);margin-bottom:12px}
    .bars{display:flex;align-items:flex-end;gap:6px;height:90px}
    .bar-col{flex:1;display:flex;flex-direction:column;align-items:center;min-width:0}
    .bar-val{font-size:10px;color:var(--muted);margin-bottom:4px;white-space:nowrap}
    .bar-fill{width:100%;background:var(--accent);border-radius:2px 2px 0 0;min-height:2px;opacity:.8}
    .bar-lbl{font-size:10px;color:var(--muted);margin-top:4px}
    .platforms{background:var(--card);border:1px solid var(--border);padding:16px}
    .platforms-header{font-size:10px;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);margin-bottom:10px}
    .platform-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
    .platform-row:last-child{border-bottom:none}
    .platform-name{display:flex;align-items:center;gap:10px}
    .dot{width:6px;height:6px;border-radius:50%;background:var(--border);flex-shrink:0}
    .dot.active{background:var(--accent)}
    .platform-row .name{font-weight:500}
    .platform-row.inactive .name{color:var(--muted)}
    .platform-row .val{font-size:11px;color:var(--muted)}
    .platform-row.active .val{color:var(--fg)}
    footer{margin-top:24px;text-align:center;font-size:10px;color:var(--muted)}
    @media(max-width:480px){
      .stats{grid-template-columns:1fr}
      h1{font-size:20px}
    }
    </style>
    </head>
    <body>
    <main>
      <header>
        <div>
          <h1>Passive Income</h1>
          <p id="subtitle">Loading…</p>
        </div>
        <div class="header-right">
          <span id="last-fetch">—</span>
          <button id="btn-refresh" onclick="loadData()">↻ Refresh</button>
        </div>
      </header>
    
      <div id="error-box" style="display:none" class="error"></div>
    
      <div class="stats" id="stats">
        <div class="card">
          <div class="card-label">Balance</div>
          <div class="card-value" id="s-balance">—</div>
          <div class="card-sub" id="s-balance-sub">—</div>
        </div>
        <div class="card">
          <div class="card-label">Today</div>
          <div class="card-value" id="s-today">—</div>
          <div class="card-sub" id="s-today-sub">—</div>
        </div>
        <div class="card">
          <div class="card-label" id="s-month-lbl">Month</div>
          <div class="card-value" id="s-month">—</div>
          <div class="card-sub" id="s-month-sub">—</div>
        </div>
      </div>
    
      <div class="chart-card">
        <div class="chart-header">Monthly History</div>
        <div class="bars" id="bars">Loading…</div>
      </div>
    
      <div class="platforms">
        <div class="platforms-header">Platforms</div>
        <div id="platforms-list">
          <div class="platform-row"><div class="platform-name"><div class="dot"></div><span class="name">Loading…</span></div><span class="val">—</span></div>
        </div>
      </div>
    
      <footer id="footer">Passive Income Tracker</footer>
    </main>
    
    <script>
    const API_URL = './data/earnings.json';
    const PLACEHOLDER = {
      honeygain: {
        today: { credits: 0.89, usd: 0, gathering_bytes: 944484359 },
        balance: { credits: 1521.33, usd_cents: 152 },
        monthly: { '2026-03': 0, '2026-04': 0 },
        _meta: { lastUpdated: new Date().toISOString(), loginMethod: 'fallback' }
      }
    };
    
    function fmt(n, d=2) { return n.toFixed(d); }
    function fmtGB(b) { return (b / 1024 / 1024 / 1024).toFixed(2); }
    function nowStr() { return new Date().toLocaleTimeString('en-US', {hour: '2-digit', minute: '2-digit'}); }
    
    function setErr(msg) {
      const el = document.getElementById('error-box');
      if (msg) { el.textContent = msg; el.style.display = ''; }
      else { el.style.display = 'none'; }
    }
    
    function renderBars(monthly) {
      const entries = Object.entries(monthly).sort();
      if (!entries.length) return;
      const max = Math.max(...entries.map(([,v]) => v), 0.01);
      const html = entries.map(([month, val]) => {
        const h = Math.max((val / max) * 75, 2);
        const op = val <= 0 ? 0.15 : 0.8;
        return '<div class="bar-col"><div class="bar-val">$' + fmt(val) + '</div>' +
               '<div class="bar-fill" style="height:' + h + 'px;opacity:' + op + '"></div>' +
               '<div class="bar-lbl">' + month.slice(5) + '</div></div>';
      }).join('');
      document.getElementById('bars').innerHTML = html;
    }
    
    function renderPlatforms(data) {
      const platforms = [
        { id: 'honeygain', name: 'Honeygain', d: data.honeygain, active: true },
        { id: 'earnfm', name: 'EarnFM', d: null },
        { id: 'packetstream', name: 'PacketStream', d: null },
        { id: 'mysterium', name: 'Mysterium', d: null },
        { id: 'kaggle', name: 'Kaggle', d: null },
      ];
      const html = platforms.map(p => {
        const active = p.d && p.d.balance;
        const val = active ? ('$' + fmt(p.d.balance.usd_cents / 100) + ' · ' + fmt(p.d.balance.credits) + ' cr') : '—';
        return '<div class="platform-row ' + (active ? 'active' : 'inactive') + '">' +
               '<div class="platform-name"><div class="dot ' + (active ? 'active' : '') + '"></div>' +
               '<span class="name">' + p.name + '</span></div>' +
               '<span class="val">' + val + '</span></div>';
      }).join('');
      document.getElementById('platforms-list').innerHTML = html;
    }
    
    async function loadData() {
      const btn = document.getElementById('btn-refresh');
      btn.disabled = true;
      btn.textContent = '…';
      setErr('');
    
      let data = null;
      try {
        const ctrl = new AbortController();
        setTimeout(() => ctrl.abort(), 4000);
        const res = await fetch(API_URL, { signal: ctrl.signal, cache: 'no-store' });
        if (!res.ok) throw new Error(res.status);
        data = await res.json();
        document.getElementById('last-fetch').textContent = nowStr();
      } catch (e) {
        data = PLACEHOLDER;
        setErr('API unavailable — showing demo data');
        document.getElementById('last-fetch').textContent = 'stale';
      }
    
      const hg = data.honeygain || PLACEHOLDER.honeygain;
      const meta = hg._meta || {};
    
      // Header
      const monthKeys = Object.keys(hg.monthly || {}).sort();
      const thisMonth = monthKeys[monthKeys.length - 1] || '—';
      document.getElementById('subtitle').textContent = thisMonth + ' · ' + (meta.loginMethod === 'auto' ? 'live' : 'cached');
    
      // Stats
      document.getElementById('s-balance').textContent = '$' + fmt((hg.balance?.usd_cents || 0) / 100);
      document.getElementById('s-balance-sub').textContent = fmt(hg.balance?.credits || 0) + ' cr';
      document.getElementById('s-today').textContent = '$' + fmt(hg.today?.usd || 0, 3);
      document.getElementById('s-today-sub').textContent = fmt(hg.today?.credits || 0) + ' cr · ' + fmtGB(hg.today?.gathering_bytes || 0) + ' GB';
      document.getElementById('s-month-lbl').textContent = thisMonth;
      const monthlyTotal = Object.values(hg.monthly || {}).reduce((a, b) => a + b, 0);
      document.getElementById('s-month').textContent = '$' + fmt(monthlyTotal);
      document.getElementById('s-month-sub').textContent = monthKeys.length + ' months tracked';
    
      // Chart
      renderBars(hg.monthly || {});
    
      // Platforms
      renderPlatforms(data);
    
      btn.disabled = false;
      btn.textContent = '↻ Refresh';
    }
    
    loadData();
    </script>
    </body>
    </html>
    
