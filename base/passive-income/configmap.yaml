apiVersion: v1
kind: ConfigMap
metadata:
  name: passive-income-html
  namespace: passive-income
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Passive Income Tracker ~</title>
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
        <style>
            :root { --bg: #1a1a2e; --card: #16213e; --accent: #e94560; --honey: #ffb347; --text: #eee; --muted: #a0a0a0; --success: #00d9ff; }
            * { margin: 0; padding: 0; box-sizing: border-box; }
            body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 2rem;
                   background-image: radial-gradient(circle at 10% 20%, rgba(233, 69, 96, 0.1) 0%, transparent 40%),
                                     radial-gradient(circle at 90% 80%, rgba(255, 179, 71, 0.08) 0%, transparent 40%); }
            .container { max-width: 1200px; margin: 0 auto; }
            header { text-align: center; margin-bottom: 3rem; }
            header h1 { font-size: 2.5rem; font-weight: 800; background: linear-gradient(135deg, var(--honey), var(--accent), var(--success));
                        -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.5rem; }
            header p { color: var(--muted); font-size: 1.1rem; }
            .total-card { background: linear-gradient(135deg, rgba(233,69,96,0.2), rgba(255,179,71,0.15)); border: 1px solid rgba(255,255,255,0.1);
                          border-radius: 24px; padding: 2rem; text-align: center; margin-bottom: 2rem; backdrop-filter: blur(10px); position: relative; overflow: hidden; }
            .total-card::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
                                  background: radial-gradient(circle, rgba(255,255,255,0.03) 0%, transparent 70%);
                                  animation: pulse 4s ease-in-out infinite; }
            @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
            .total-label { font-size: 1rem; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; position: relative; }
            .total-amount { font-size: 3.5rem; font-weight: 800; margin: 0.5rem 0; position: relative; }
            .total-amount span { font-size: 1.5rem; vertical-align: super; opacity: 0.7; }
            .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
            .card { background: var(--card); border-radius: 20px; padding: 1.5rem; border: 1px solid rgba(255,255,255,0.05); transition: transform 0.2s, box-shadow 0.2s; position: relative; overflow: hidden; }
            .card:hover { transform: translateY(-4px); box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
            .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
            .platform-name { font-size: 1.3rem; font-weight: 700; display: flex; align-items: center; gap: 0.5rem; }
            .platform-icon { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; }
            .honeygain { background: rgba(255, 179, 71, 0.15); color: var(--honey); }
            .status { font-size: 0.75rem; padding: 0.3rem 0.8rem; border-radius: 20px; background: rgba(0, 217, 255, 0.1); color: var(--success); font-weight: 600; }
            .month-row { display: flex; justify-content: space-between; align-items: center; padding: 0.6rem 0; border-bottom: 1px solid rgba(255,255,255,0.03); cursor: pointer; }
            .month-row:last-child { border-bottom: none; }
            .month-name { color: var(--muted); font-size: 0.9rem; }
            .month-input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: var(--text);
                           padding: 0.3rem 0.8rem; border-radius: 8px; width: 80px; text-align: right; font-family: inherit; font-size: 0.9rem; transition: all 0.2s; }
            .month-input:focus { outline: none; border-color: var(--accent); background: rgba(255,255,255,0.08); }
            .month-value { font-size: 0.95rem; font-weight: 600; min-width: 60px; text-align: right; }
            .month-value.auto { color: var(--success); }
            .month-value.manual { color: var(--honey); }
            .edit-hint { font-size: 0.7rem; color: var(--muted); opacity: 0; transition: opacity 0.2s; margin-left: 0.5rem; }
            .month-row:hover .edit-hint { opacity: 1; }
            .platform-total { margin-top: 1rem; padding-top: 1rem; border-top: 2px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; font-weight: 700; font-size: 1.1rem; }
            .tag { font-size: 0.65rem; padding: 0.15rem 0.4rem; border-radius: 4px; margin-left: 0.5rem; font-weight: 600; text-transform: uppercase; }
            .tag.auto { background: rgba(0,217,255,0.15); color: var(--success); }
            .tag.manual { background: rgba(255,179,71,0.15); color: var(--honey); }
            .chart-container { background: var(--card); border-radius: 20px; padding: 1.5rem; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 2rem; }
            .chart-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 1rem; color: var(--muted); }
            .add-btn { position: fixed; bottom: 2rem; right: 2rem; width: 60px; height: 60px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--honey)); border: none; color: white;
                       font-size: 1.8rem; cursor: pointer; box-shadow: 0 10px 30px rgba(233,69,96,0.4); transition: transform 0.2s; display: flex; align-items: center; justify-content: center; }
            .add-btn:hover { transform: scale(1.1) rotate(90deg); }
            .last-updated { text-align: center; color: var(--muted); font-size: 0.85rem; margin-top: 1rem; }
            @media (max-width: 600px) { body { padding: 1rem; } .total-amount { font-size: 2.5rem; } header h1 { font-size: 1.8rem; } }
        </style>
    </head>
    <body>
        <div class="container">
            <header><h1>Passive Income Tracker</h1><p>Honeygain data auto-scraped daily at 23:55 ~ 🍯</p></header>

            <div class="total-card">
                <div class="total-label">Total Earned (YTD)</div>
                <div class="total-amount"><span>$</span><span id="grandTotal">0.00</span></div>
            </div>

            <div class="chart-container"><div class="chart-title">Monthly Overview ~</div><canvas id="mainChart" height="100"></canvas></div>

            <div class="grid" id="cardsContainer"></div>
            <div class="last-updated" id="lastUpdated"></div>
        </div>
        <button class="add-btn" onclick="addPlatform()" title="Add new platform">+</button>

        <script>
            const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
            const currentMonth = new Date().getMonth();
            const currentYear = new Date().getFullYear();
            const yearMonth = m => `${currentYear}-${String(m+1).padStart(2,'0')}`;
            let autoData = {};
            let overrides = JSON.parse(localStorage.getItem('passiveIncomeOverrides') || '{}');

            let platforms = [];

            function formatMoney(n) { return Number(n).toFixed(2); }
            function getValue(platform, monthIdx) {
                const key = `${platform.id}-${yearMonth(monthIdx)}`;
                if (overrides[key] !== undefined) return overrides[key];
                const d = autoData[platform.id];
                if (d && d.monthly && d.monthly[yearMonth(monthIdx)] !== undefined) return d.monthly[yearMonth(monthIdx)];
                return 0;
            }
            function isAuto(platform, monthIdx) {
                const key = `${platform.id}-${yearMonth(monthIdx)}`;
                return overrides[key] === undefined && autoData[platform.id] && autoData[platform.id].monthly && autoData[platform.id].monthly[yearMonth(monthIdx)] !== undefined;
            }
            function getPlatformTotal(p) {
                return months.reduce((sum, _, i) => sum + getValue(p, i), 0);
            }
            function getGrandTotal() {
                return platforms.reduce((sum, p) => sum + getPlatformTotal(p), 0);
            }
            function getMonthlyTotals() {
                return months.map((_, i) => platforms.reduce((sum, p) => sum + getValue(p, i), 0));
            }
            function saveOverride(platformIdx, monthIdx, value) {
                const p = platforms[platformIdx];
                const key = `${p.id}-${yearMonth(monthIdx)}`;
                if (value === '' || value == null || Number(value) === 0) {
                    if (isAuto(p, monthIdx)) { delete overrides[key]; }
                    else { overrides[key] = 0; }
                } else {
                    overrides[key] = Number(value);
                }
                localStorage.setItem('passiveIncomeOverrides', JSON.stringify(overrides));
                render();
            }

            async function loadData() {
                try {
                    const r = await fetch('./data/earnings.json');
                    if (r.ok) {
                        autoData = await r.json();
                        const lu = document.getElementById('lastUpdated');
                        if (autoData._meta && autoData._meta.lastUpdated) {
                            lu.textContent = `Auto data updated: ${new Date(autoData._meta.lastUpdated).toLocaleString('en-GB')}`;
                        }
                    }
                } catch (e) { console.log('No auto data yet', e); }
                render();
            }

            function render() {
                const container = document.getElementById('cardsContainer');
                container.innerHTML = '';
                platforms.forEach((p, pIdx) => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    let rows = '';
                    months.forEach((m, i) => {
                        const isFuture = i > currentMonth;
                        const val = getValue(p, i);
                        const auto = isAuto(p, i);
                        const tag = auto ? '<span class="tag auto">auto</span>' : '<span class="tag manual">edit</span>';
                        if (isFuture) {
                            rows += `<div class="month-row"><span class="month-name">${m}</span><span class="month-value">-</span></div>`;
                        } else {
                            rows += `
                                <div class="month-row" onclick="enableEdit(this, ${pIdx}, ${i})">
                                    <span class="month-name" style="${i===currentMonth?'color:var(--accent);font-weight:700;':''}">${m}${tag}</span>
                                    <span class="month-value ${auto?'auto':'manual'}" data-pidx="${pIdx}" data-midx="${i}">$${formatMoney(val)}</span>
                                    <span class="edit-hint">click to edit</span>
                                </div>`;
                        }
                    });
                    card.innerHTML = `
                        <div class="card-header">
                            <div class="platform-name"><div class="platform-icon ${p.class}">${p.icon}</div>${p.name}</div>
                            <span class="status">Active</span>
                        </div>
                        ${rows}
                        <div class="platform-total"><span>Total</span><span>$${formatMoney(getPlatformTotal(p))}</span></div>`;
                    container.appendChild(card);
                });
                document.getElementById('grandTotal').textContent = formatMoney(getGrandTotal());
                updateChart();
            }

            function enableEdit(row, pIdx, mIdx) {
                const existing = row.querySelector('.month-value');
                if (row.querySelector('input')) return;
                const current = getValue(platforms[pIdx], mIdx);
                const input = document.createElement('input');
                input.type = 'number'; input.step = '0.01'; input.className = 'month-input';
                input.value = current;
                input.onblur = () => { saveOverride(pIdx, mIdx, input.value); };
                input.onkeydown = e => { if (e.key === 'Enter') { input.blur(); } };
                existing.replaceWith(input);
                input.focus();
            }

            let chartInstance = null;
            function updateChart() {
                const ctx = document.getElementById('mainChart').getContext('2d');
                if (chartInstance) chartInstance.destroy();
                const monthlyTotals = getMonthlyTotals();
                chartInstance = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: months,
                        datasets: platforms.map(p => ({
                            label: p.name,
                            data: months.map((_,i)=>getValue(p,i)),
                            borderColor: p.color || '#e94560',
                            backgroundColor: (p.color || '#e94560') + '20',
                            tension: 0.4, fill: true, pointRadius: 4, pointHoverRadius: 6
                        }))
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        interaction: { mode: 'index', intersect: false },
                        plugins: { legend: { labels: { color: '#a0a0a0', font: { family:'Nunito' } } } },
                        scales: { y: { beginAtZero: true, grid: { color:'rgba(255,255,255,0.03)' },
                                      ticks: { color:'#a0a0a0', font:{family:'Nunito'}, callback:v=>'$'+v } },
                                  x: { grid:{display:false}, ticks:{color:'#a0a0a0',font:{family:'Nunito'}} }
                        }
                    }
                });
            }

            function addPlatform() {
                const name = prompt('Platform name?'); if (!name) return;
                const icon = prompt('Emoji? (e.g. 💰)') || '💎';
                const colors = ['#00d9ff','#a855f7','#22c55e','#f472b6','#fbbf24'];
                platforms.push({ id: name.toLowerCase().replace(/\s+/g,'-'), name, icon, class:'',
                                 color: colors[platforms.length%colors.length], data: new Array(12).fill(0) });
                render();
            }

            platforms = JSON.parse(localStorage.getItem('passiveIncomePlatforms') || 'null') || [
                { id:'honeygain', name:'Honeygain', icon:'🍯', class:'honeygain', color:'#ffb347', data: new Array(12).fill(0) }
            ];

            loadData();
        </script>
    </body>
    </html>