apiVersion: v1
kind: ConfigMap
metadata:
  name: passive-income-html
  namespace: passive-income
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Passive Income</title>
    <style>
    :root{--bg:#0a0a0a;--fg:#e5e5e5;--accent:#2563eb;--muted:#737373;--card:#141414;--border:#262626;--border-hover:#404040;--warn:#d97706;--success:#10b981}
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:var(--bg);color:var(--fg);font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:14px;line-height:1.4;-webkit-font-smoothing:antialiased}
    main{max-width:640px;margin:0 auto;padding:32px 16px}
    header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:24px;gap:16px}
    h1{font-size:24px;font-weight:700;letter-spacing:-0.02em;line-height:1}
    header p{color:var(--muted);font-size:11px;margin-top:4px}
    .header-right{display:flex;align-items:center;gap:12px}
    #last-fetch{font-size:11px;color:var(--muted);white-space:nowrap}
    button{background:transparent;color:var(--fg);border:1px solid var(--border);padding:5px 12px;font-size:12px;font-weight:500;cursor:pointer;transition:border-color .15s}
    button:hover{border-color:var(--border-hover)}
    button:disabled{opacity:.3;cursor:default}
    .error{font-size:11px;color:var(--warn);border:1px solid rgba(217,119,6,.2);background:rgba(217,119,6,.08);padding:8px 12px;margin-bottom:16px;line-height:1.5}
    .stats{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:16px}
    .card{background:var(--card);border:1px solid var(--border);padding:16px}
    .card-label{font-size:10px;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);margin-bottom:6px}
    .card-value{font-size:22px;font-weight:700;line-height:1}
    .card-sub{font-size:10px;color:var(--muted);margin-top:3px}
    .platforms{background:var(--card);border:1px solid var(--border);padding:16px;margin-bottom:16px}
    .platforms-header{font-size:10px;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);margin-bottom:12px}
    .platform-card{padding:12px 0;border-bottom:1px solid var(--border)}
    .platform-card:last-child{border-bottom:none}
    .platform-name{font-size:14px;font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:8px}
    .platform-name .tag{font-size:9px;padding:2px 6px;border-radius:3px;text-transform:uppercase;letter-spacing:0.04em;font-weight:600}
    .tag.active{background:rgba(16,185,129,.15);color:var(--success)}
    .tag.inactive{background:rgba(217,119,6,.15);color:var(--warn)}
    .tag.offline{background:rgba(115,115,115,.15);color:var(--muted)}
    .platform-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
    .platform-stat-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.04em}
    .platform-stat-value{font-size:13px;font-weight:600;margin-top:2px}
    .platform-stat-sub{font-size:9px;color:var(--muted);margin-top:1px}
    .chart-card{background:var(--card);border:1px solid var(--border);padding:16px;margin-bottom:16px}
    .chart-header{font-size:10px;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);margin-bottom:12px}
    .bars{display:flex;align-items:flex-end;gap:6px;height:90px}
    .bar-col{flex:1;display:flex;flex-direction:column;align-items:center;min-width:0}
    .bar-val{font-size:10px;color:var(--muted);margin-bottom:4px;white-space:nowrap}
    .bar-fill{width:100%;background:var(--accent);border-radius:2px 2px 0 0;min-height:2px;opacity:.8}
    .bar-lbl{font-size:10px;color:var(--muted);margin-top:4px}
    footer{margin-top:24px;text-align:center;font-size:10px;color:var(--muted)}
    @media(max-width:480px){.stats{grid-template-columns:1fr}.platform-grid{grid-template-columns:1fr}h1{font-size:20px}}
    </style>
    </head>
    <body>
    <main>
      <header>
        <div><h1>Passive Income</h1><p id="subtitle">Loading...</p></div>
        <div class="header-right"><span id="last-fetch">--</span><button id="btn-refresh" onclick="loadData()">&#x21bb; Refresh</button></div>
      </header>
      <div id="error-box" style="display:none" class="error"></div>
      <div class="stats" id="stats">
        <div class="card"><div class="card-label">Total Balance</div><div class="card-value" id="s-balance">--</div><div class="card-sub" id="s-balance-sub">--</div></div>
        <div class="card"><div class="card-label">Today</div><div class="card-value" id="s-today">--</div><div class="card-sub" id="s-today-sub">--</div></div>
      </div>
      <div class="platforms" id="platforms">
        <div class="platforms-header">Platforms</div>
        <div id="platforms-list">Loading...</div>
      </div>
      <div class="chart-card">
        <div class="chart-header">Honeygain Monthly</div>
        <div class="bars" id="bars">Loading...</div>
      </div>
      <footer id="footer">Passive Income Dashboard</footer>
    </main>
    <script>
    const API_URL='./data/earnings.json';
    function fmt(n,d){if(n===undefined||n===null)return'--';return Number(n).toFixed(d===undefined?2:d)}
    function fmtGB(b){if(!b)return'0.00';return(b/1024/1024/1024).toFixed(2)}
    function nowStr(){return new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})}
    function setErr(msg){const el=document.getElementById('error-box');if(msg){el.textContent=msg;el.style.display=''}else{el.style.display='none'}}
    function renderBars(monthly){const entries=Object.entries(monthly).sort();if(!entries.length)return;const max=Math.max(...entries.map(function(e){return e[1]}),0.01);let html='';for(let i=0;i<entries.length;i++){const month=entries[i][0],val=entries[i][1];const h=Math.max((val/max)*75,2);const op=val<=0?0.15:0.8;html+='<div class="bar-col"><div class="bar-val">$'+fmt(val)+'</div>'+'<div class="bar-fill" style="height:'+h+'px;opacity:'+op+'"></div>'+'<div class="bar-lbl">'+month.slice(5)+'</div></div>'}document.getElementById('bars').innerHTML=html}
    function renderPlatformCard(id,name,data){let tag,tagClass,statsHtml='';if(id==='honeygain'){const active=data&&data.balance&&data.balance.usd_cents!==undefined;tag=active?'Active':'Inactive';tagClass=active?'active':'inactive';const credits=data&&data.balance?data.balance.credits:0;const usd=data&&data.balance?(data.balance.usd_cents/100):0;const todayCredits=data&&data.today?data.today.credits:0;const todayBytes=data&&data.today?data.today.gathering_bytes:0;statsHtml='<div class="platform-grid">'+'<div><div class="platform-stat-label">Balance</div><div class="platform-stat-value">$'+fmt(usd)+'</div><div class="platform-stat-sub">'+fmt(credits,2)+' cr</div></div>'+'<div><div class="platform-stat-label">Today</div><div class="platform-stat-value">'+fmt(todayCredits,2)+' cr</div><div class="platform-stat-sub">'+fmtGB(todayBytes)+' GB</div></div>'+'<div><div class="platform-stat-label">Monthly</div><div class="platform-stat-value">$'+fmt(data&&data.monthly?Object.values(data.monthly).reduce(function(a,b){return a+b},0):0)+'</div></div>'+'</div>'}else if(id==='mysterium'){const status=data&&data.status?data.status:'Unknown';tag=status;tagClass=status==='Registered'?'active':(status==='Offline'||status==='Unknown'?'offline':'inactive');const balanceMYST=data&&data.balance_wei?(data.balance_wei/1e18):0;const earningsMYST=data&&data.earnings_wei?(data.earnings_wei/1e18):0;const loc=data&&data.location?data.location:{};statsHtml='<div class="platform-grid">'+'<div><div class="platform-stat-label">Balance</div><div class="platform-stat-value">'+fmt(balanceMYST,4)+' MYST</div></div>'+'<div><div class="platform-stat-label">Earnings</div><div class="platform-stat-value">'+fmt(earningsMYST,4)+' MYST</div></div>'+'<div><div class="platform-stat-label">Location</div><div class="platform-stat-value">'+(loc.country||'--')+'</div><div class="platform-stat-sub">'+(loc.isp||'')+'</div></div>'+'</div>'}else{tag='Inactive';tagClass='inactive';statsHtml='<div class="platform-grid"><div><div class="platform-stat-label">Status</div><div class="platform-stat-value">--</div></div></div>'}return'<div class="platform-card">'+'<div class="platform-name">'+name+'<span class="tag '+tagClass+'">'+tag+'</span></div>'+statsHtml+'</div>'}
    async function loadData(){const btn=document.getElementById('btn-refresh');btn.disabled=true;btn.textContent='...';setErr('');let data=null;try{const ctrl=new AbortController();setTimeout(function(){ctrl.abort()},4000);const res=await fetch(API_URL,{signal:ctrl.signal,cache:'no-store'});if(!res.ok)throw new Error(res.status);data=await res.json();document.getElementById('last-fetch').textContent=nowStr()}catch(e){setErr('API unavailable -- showing demo data');document.getElementById('last-fetch').textContent='stale';data={honeygain:{today:{credits:1.31,usd:0,gathering_bytes:948003328},balance:{credits:1521.76,usd_cents:152},monthly:{'2026-03':0,'2026-04':0}},mysterium:{status:'Offline',balance_wei:0,earnings_wei:0,location:{}}}}const meta=data._meta||{};const monthKeys=data.honeygain&&data.honeygain.monthly?Object.keys(data.honeygain.monthly).sort():[];const thisMonth=monthKeys[monthKeys.length-1]||'--';document.getElementById('subtitle').textContent=thisMonth+' · '+(meta.loginMethod==='auto'?'live':'cached');const honeyBalance=data.honeygain&&data.honeygain.balance?(data.honeygain.balance.usd_cents||0)/100:0;const mystBalance=data.mysterium&&data.mysterium.balance_wei?(data.mysterium.balance_wei/1e18):0;const totalUSD=honeyBalance+(mystBalance*0.16);document.getElementById('s-balance').textContent='$'+fmt(totalUSD);document.getElementById('s-balance-sub').textContent='Honeygain + Myst';const todayCredits=data.honeygain&&data.honeygain.today?(data.honeygain.today.credits||0):0;document.getElementById('s-today').textContent=fmt(todayCredits,2)+' cr';document.getElementById('s-today-sub').textContent='Honeygain today';renderBars(data.honeygain&&data.honeygain.monthly?data.honeygain.monthly:{});let platformsHtml='';platformsHtml+=renderPlatformCard('honeygain','Honeygain',data.honeygain);platformsHtml+=renderPlatformCard('mysterium','Mysterium',data.mysterium);if(!data.earnfm)platformsHtml+=renderPlatformCard('earnfm','EarnFM',null);if(!data.packetstream)platformsHtml+=renderPlatformCard('packetstream','PacketStream',null);if(!data.pawns)platformsHtml+=renderPlatformCard('pawns','Pawns.app',null);document.getElementById('platforms-list').innerHTML=platformsHtml;btn.disabled=false;btn.textContent='↻ Refresh'}
    loadData()
    </script>
    </body>
    </html>
