apiVersion: v1
kind: ConfigMap
metadata:
  name: passive-income-scraper
  namespace: passive-income
data:
  scraper.py: |
    #!/usr/bin/env python3
    import urllib.request, json, os, ssl, sys, subprocess
    from datetime import datetime, timezone

    DATA_PATH   = '/data/earnings.json'
    HONEY_API   = 'https://dashboard.honeygain.com/api/v1'
    MYST_TEQUIL = 'http://127.0.0.1:14050'
    AUTH_FILE='/secrets/auth/auth.json'
    TOKEN_FILE='/secrets/token/token'
    TALOS_KUBECONFIG = '/secrets/talos/kubeconfig'
    YEAR        = datetime.now(timezone.utc).year

    def read_json(path):
        with open(path) as f:
            return json.load(f)

    def read_token():
        with open(TOKEN_FILE) as f:
            return f.read().strip()

    def honey_login():
        if not os.path.exists(AUTH_FILE):
            return None
        try:
            creds = read_json(AUTH_FILE)
            email = creds.get('email', '')
            password = creds.get('password', '')
            if not email or not password:
                return None
            payload = json.dumps({'email': email, 'password': password}).encode()
            req = urllib.request.Request(
                f'{HONEY_API}/users/tokens',
                data=payload,
                headers={'Content-Type': 'application/json', 'Accept': 'application/json'},
                method='POST'
            )
            ctx = ssl.create_default_context()
            ctx.check_hostname = False
            ctx.verify_mode = ssl.CERT_NONE
            with urllib.request.urlopen(req, context=ctx, timeout=30) as r:
                body = json.loads(r.read().decode())
                token = (body.get('data', {}).get('token') or
                         body.get('token') or
                         body.get('access_token'))
                print(f'Honeygain login OK.')
                return token
        except Exception as e:
            print(f'Honeygain login failed: {e}')
            return None

    def honey_fetch(token, path):
        req = urllib.request.Request(
            f'{HONEY_API}/{path}',
            headers={'Authorization': f'Bearer {token}', 'Accept': 'application/json'}
        )
        ctx = ssl.create_default_context()
        ctx.check_hostname = False
        ctx.verify_mode = ssl.CERT_NONE
        with urllib.request.urlopen(req, context=ctx, timeout=30) as r:
            return json.loads(r.read().decode())

    def myst_fetch(path):
        req = urllib.request.Request(f'{MYST_TEQUIL}/{path}')
        with urllib.request.urlopen(req, timeout=10) as r:
            return json.loads(r.read().decode())

    def repocket_check():
        """Check Repocket pod status on Talos cluster. No public earnings API available."""
        if not os.path.exists(TALOS_KUBECONFIG):
            print('Repocket: Talos kubeconfig not mounted.')
            return {'status': 'Unknown', 'note': 'kubeconfig missing'}
        try:
            # Check pod status
            result = subprocess.run(
                ['kubectl', '--kubeconfig', TALOS_KUBECONFIG, 'get', 'pod',
                 '-n', 'repocket', '-l', 'app=repocket-client',
                 '-o', 'jsonpath={.items[0].status.phase}'],
                capture_output=True, text=True, timeout=10
            )
            pod_status = result.stdout.strip()

            # Check recent logs for connection markers
            result2 = subprocess.run(
                ['kubectl', '--kubeconfig', TALOS_KUBECONFIG, 'logs',
                 '-n', 'repocket', '-l', 'app=repocket-client', '--tail=30'],
                capture_output=True, text=True, timeout=10
            )
            logs = result2.stdout + result2.stderr
            is_connected = 'peer connected' in logs or 'Connection established' in logs
            error_count = logs.count('ECONNREFUSED') + logs.count('ECONNRESET')

            if pod_status == 'Running' and is_connected and error_count < 5:
                return {'status': 'Active', 'pod_status': 'Running',
                        'note': 'earnings not available via API'}
            elif pod_status == 'Running':
                return {'status': 'Intermittent', 'pod_status': 'Running',
                        'errors': error_count, 'note': 'failing connections to proxy'}
            else:
                return {'status': 'Inactive', 'pod_status': pod_status,
                        'note': 'pod not running'}
        except Exception as e:
            print(f'Repocket check error: {e}')
            return {'status': 'Unknown', 'error': str(e)}

    def main():
        ts = datetime.now(timezone.utc).isoformat()
        print(f'[{ts}] Starting scraper...')

        # Honeygain
        token = honey_login()
        login_used = bool(token)
        if not token:
            try:
                token = read_token()
            except Exception as e:
                print(f'No Honeygain token: {e}')
            else:
                print('Using static JWT for Honeygain.')

        if token:
            try:
                stats = honey_fetch(token, 'earnings/stats')
                today = honey_fetch(token, 'earnings/today')
                balances = honey_fetch(token, 'users/balances')

                monthly = {}
                for date_str, day_data in stats.items():
                    if not str(date_str).startswith(str(YEAR)):
                        continue
                    month_key = str(date_str)[:7]
                    day_total = (
                        day_data.get('gathering', {}).get('credits', 0) +
                        day_data.get('content_delivery', {}).get('credits', 0) +
                        day_data.get('referrals', {}).get('credits', 0) +
                        day_data.get('winnings', {}).get('credits', 0) +
                        day_data.get('other', {}).get('credits', 0)
                    )
                    monthly[month_key] = monthly.get(month_key, 0) + day_total

                hg_data = {
                    'monthly': {k: round(v / 1000, 2) for k, v in sorted(monthly.items())},
                    'today': {
                        'credits': today.get('total', {}).get('credits', 0),
                        'usd': round(today.get('total', {}).get('credits', 0) / 1000, 2),
                        'gathering_bytes': today.get('gathering', {}).get('bytes', 0),
                    },
                    'balance': {
                        'credits': balances.get('data', {}).get('payout', {}).get('credits', 0),
                        'usd_cents': balances.get('data', {}).get('payout', {}).get('usd_cents', 0),
                    }
                }
            except urllib.error.HTTPError as e:
                if e.code == 401:
                    print('Honeygain token rejected (401).')
                    hg_data = None
                else:
                    raise
            except Exception as e:
                print(f'Honeygain fetch failed: {e}')
                hg_data = None
        else:
            print('No Honeygain token available.')
            hg_data = None

        # Mysterium
        try:
            ident_list = myst_fetch('identities')
            ident = {}
            if ident_list.get('identities'):
                ident_id = ident_list['identities'][0]['id']
                ident = myst_fetch(f'identities/{ident_id}')
            loc = myst_fetch('location')
            myst_data = {
                'identity': ident.get('id', ''),
                'status': ident.get('registration_status', 'Unknown'),
                'balance_wei': ident.get('balance', 0),
                'earnings_wei': ident.get('earnings', 0),
                'earnings_total_wei': ident.get('earnings_total', 0),
                'stake': ident.get('stake', 0),
                'hermes': ident.get('hermes_id', ''),
                'channel': ident.get('channel_address', ''),
                'location': {
                    'country': loc.get('country', ''),
                    'city': loc.get('city', ''),
                    'isp': loc.get('isp', ''),
                    'ip_type': loc.get('ip_type', ''),
                }
            }
        except Exception as e:
            print(f'Mysterium fetch failed: {e}')
            myst_data = {
                'status': 'Offline',
                'balance_wei': 0,
                'earnings_wei': 0,
                'location': {}
            }

        # Repocket
        rp_data = repocket_check()

        # Combine
        data = {
            '_meta': {
                'lastUpdated': datetime.now(timezone.utc).isoformat().replace('+00:00', 'Z'),
                'year': YEAR,
                'loginMethod': 'auto' if login_used else 'fallback'
            }
        }

        if hg_data:
            data['honeygain'] = hg_data

        data['mysterium'] = myst_data
        data['repocket'] = rp_data

        os.makedirs(os.path.dirname(DATA_PATH), exist_ok=True)
        with open(DATA_PATH, 'w') as f:
            json.dump(data, f, indent=2)

        print(f'Saved {DATA_PATH}')
        print(json.dumps(data, indent=2))

    if __name__ == '__main__':
        main()
