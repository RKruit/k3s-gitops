apiVersion: apps/v1
kind: Deployment
metadata:
  name: xwiki
  namespace: xwiki
  labels:
    app: xwiki
spec:
  replicas: 1
  selector:
    matchLabels:
      app: xwiki
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: xwiki
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z postgres 5432; do echo "Waiting for postgres..."; sleep 2; done']
      containers:
        - name: xwiki
          image: xwiki:lts-postgres-tomcat
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: DB_HOST
              value: "postgres"
            - name: DB_DATABASE
              value: "xwiki"
            - name: DB_USER
              value: "xwiki"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: xwiki-postgres-secret
                  key: password
            - name: INDEX_HOST
              value: "localhost"
            - name: CATALINA_OPTS
              value: "-Xmx1024m -XX:MaxRAMPercentage=75.0"
          resources:
            requests:
              cpu: 200m
              memory: 1Gi
            limits:
              cpu: "1"
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /xwiki/bin/view/Main/WebHome
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /xwiki/bin/view/Main/WebHome
              port: 8080
            initialDelaySeconds: 45
            periodSeconds: 10
            failureThreshold: 6
          volumeMounts:
            - name: data
              mountPath: /usr/local/xwiki
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: xwiki-data
